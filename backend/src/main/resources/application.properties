server.port=8080
arrangement.engine=${ARRANGEMENT_ENGINE:jjazz}
jjazz.soundfont.path=${JJAZZ_SOUNDFONT_PATH:}
jjazz.toolkit.repo.path=${JJAZZ_TOOLKIT_REPO_PATH:}
jjazz.core.repo.path=${JJAZZ_CORE_REPO_PATH:}

# Disable static resource caching to always reflect latest CSS/JS during edits.
spring.web.resources.chain.cache=false
spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.must-revalidate=true
spring.web.resources.cache.cachecontrol.max-age=0
